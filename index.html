<!DOCTYPE html>
<html pt="br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Login</title>
   <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mediaquery.css">
</head>
<body>
    <main>
            <section id='login'>
                <div id="imagem">
                
                </div>

                <div id="formulario">
                    <h1>Login</h1>
                    <p> Seja bem vindo(a) novamente. Faça login para acessar sua conta.</p>
                    
                    <form action="login.php" method="post" autocomplete="on">                      
                        <div class="campo">  
                            <i class="material-icons">person</i>                           
                            <input type="email" name="login" id="ilogin" placeholder="Digite seu e-mail" autocomplete="email" required>
                            <label for="ilogin">Login</label>
                            
                        </div>
                        
                        <div class="campo">   
                            <i class="material-icons">vpn_key</i>                         
                             <input type="password" name="senha" id="isenha" placeholder="Digite sua Senha" autocomplete="current-password" required>
                             <label for="isenha">Senha</label>
                        </div>
                        <input type="submit" value="Entrar">                      
                        <link href="esqueci.html">
                        Esqueci a Senha <i class="material-icons">mail</i>
                </div>

            </section>


    </main>
    
</body>
</html>
